# Build-time proc macros — not deployed at runtime.
[[PackageOverrides]]
name = "paste"
ecosystem = "crates.io"
vulnerability.ignore = true
reason = "compile-time proc macro only; not deployed at runtime"

[[PackageOverrides]]
name = "proc-macro-error"
ecosystem = "crates.io"
vulnerability.ignore = true
reason = "compile-time proc macro only; not deployed at runtime"

# fxhash is in the lockfile but not in any active dependency tree.
[[PackageOverrides]]
name = "fxhash"
ecosystem = "crates.io"
vulnerability.ignore = true
reason = "stale lock entry; not in any active dependency tree"

# rand 0.7.3 is a stale lock entry; not in any active dependency tree.
[[PackageOverrides]]
name = "rand"
version = "0.7.3"
ecosystem = "crates.io"
vulnerability.ignore = true
reason = "stale lock entry; not in any active dependency tree"

[[PackageOverrides]]
name = "proc-macro-error2"
ecosystem = "crates.io"
ignore = true
reason = "Compile-time proc macro only — no runtime impact (transitive via validator_derive → openid)"
