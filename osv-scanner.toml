# GTK3 desktop binding chain — only pulled in via dioxus-desktop (--all-features).
# Not used in production server/web builds.
[[PackageOverrides]]
name = "atk"
ecosystem = "crates.io"
vulnerability.ignore = true
reason = "dioxus-desktop GTK chain only; not used in server/web builds"

